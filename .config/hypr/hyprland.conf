input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 50
    repeat_delay = 500
    touchpad {
        disable_while_typing = true
        natural_scroll = false
        middle_button_emulation = true
        tap-to-click = true
    }
}

gesture = 3, horizontal, workspace

monitor=HDMI-A-2,2560x1080@160,440x-1080,1
monitor=DP-3,3440x1440@180,0x0,1

$menu = fuzzel
$bar = waybar
$wall = hyprpaper
$backlight = hyprsunset
$terminal = foot
$fileManager = dolphin
$shell = qs

exec-once = $backlight
exec-once = $wall
exec-once = $bar
exec-once = $terminal
exec-once = $shell

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,x11

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

$mainMod = SUPER
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, R, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, T, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, C, exec, hyprpicker
bind = $mainMod, E, exec, emoji
bind = $mainMod, V, exec, screenshot

bindd = CTRL ALT, DELETE, exec, exit
bindd = $mainMod CTRL, F, Full Screen, fullscreen, 1

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule = tag +terminal, match:class ^(kitty|kitty-dropterm|ghostty|wezterm|foot|footclient)$
windowrule = tag +notif, match:class ^(swaync-control-center|swaync-notification-window|swaync-client|class)$
windowrule = tag +browser, match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$
windowrule = tag +browser, match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$
windowrule = tag +browser, match:class ^(chrome-.+-Default)$
windowrule = tag +browser, match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$
windowrule = tag +browser, match:class ^(Brave-browser(-beta|-dev|-unstable)?)$
windowrule = tag +browser, match:class ^([Tt]horium-browser|[Cc]achy-browser)$
windowrule = tag +browser, match:class ^(zen-alpha|zen)$
windowrule = tag +games, match:class ^(gamescope)$
windowrule = tag +games, match:class ^(steam_app_\d+)$
windowrule = tag +multimedia_video, match:class ^([Mm]pv|vlc)$
windowrule = tag +settings, match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
windowrule = tag +settings, match:class ^(qt5ct|qt6ct|[Yy]ad)$

windowrule {
    name = roosup
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = floaterm
    match:tag = terminal*
    float = true
}

windowrule {
    name = floatsettings
    match:tag = settings*
    float = true
}

windowrule {
    name = floatobs
    match:class = ^(obs)$
    float = true
}

windowrule {
    name = floatsteam
    match:class = ^([Ss]team)$
    float = true
}

windowrule {
    name = authrule
    match:title = ^(Authentication Required)$
    center = true
    float = true
}

windowrule {
    name = floatfile
    match:title = (Open Files)
    float = true
}
windowrule {
    name = floatsave
    match:title = ^(Save As)$
    float = true
}
windowrule {
    name = floatpicture
    match:title = ^(Picture-in-Picture)$
    float = true
}
windowrule {
    name = floatfolder
    match:title = ^(Add Folder to Workspace)$
    float = true
}
windowrule {
    name = floatsetting
    match:title = ^(Settings)$
    float = true
}

windowrule {
    name = floatwelcome
    match:title = ^(Dashboard)$
    float = true
}

windowrule = move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5)), match:tag terminal*

windowrule = size 35% 35%, match:tag settings*
windowrule = size 38% 38%, match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Add Folder to Workspace)$
windowrule = size 25% 25%, match:title ^(Save As)$
windowrule = size 25% 25%, match:title (Open Files)
windowrule = size 25% 25%, match:title ^(Authentication Required)$
windowrule = size 30% 30%, match:class ^([Ss]team)$

windowrule = no_blur on, match:class browser*
windowrule = no_blur on, match:tag multimedia_video*
windowrule = opacity 0.9 override 0.5 override 0.8 override, match:tag terminal*
windowrule = opacity 0.9 0.7, match:tag settings*
windowrule = opacity 0.9 0.7, match:tag wallpaper*
windowrule = opacity 0.9, match:class ^(obs)$
windowrule = opacity 1.0, match:tag multimedia_video*
